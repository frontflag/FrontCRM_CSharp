# 部署包专用：不含 PostgreSQL 容器，数据库使用腾讯云等外部实例。
# 在部署目录创建 .env，设置 CONNECTION_STRING（见 deploy.env.example）。
# （Compose v2 不再需要顶层 version）

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.prebuilt
    container_name: frontcrm-backend
    environment:
      ASPNETCORE_URLS: http://+:5000
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
    ports:
      - "5000:5000"
    networks:
      - frontcrm-network

  frontend:
    build:
      context: CRM.Web
      dockerfile: Dockerfile.prebuilt
    container_name: frontcrm-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - frontcrm-network

networks:
  frontcrm-network:
    driver: bridge
